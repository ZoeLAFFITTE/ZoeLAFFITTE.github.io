summary: |
 I am a PhD student at the Institut de Neurosciences de la Timone (INT) in Marseille, France.
 My research focuses on the spatial organisation and co-variation of cortical folds during human neonatal brain development. More specifically, I aim to identify conserved and reproducible sulcal landmarks and model their developmental trajectories. These landmarks provide robust references for studying cortical maturation in healthy and pathological contexts and contribute to defining quantitative markers of brain development. I use geometric and topological approaches on 3D-reconstructed cortical surfaces derived from MRI data.

