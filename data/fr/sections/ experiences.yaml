    responsibilitiesTitle: Caractérisation topologique et géométrique du plissement cortical durant le développement périnatal
    responsibilities:
      - Identification et caractérisation des motifs sulcaux conservés et stables
      - Étude du plissement cortical durant le développement précoce du cerveau humain
      - Développement de méthodes d'analyse quantitatives, paramétriques et statistiques
  
