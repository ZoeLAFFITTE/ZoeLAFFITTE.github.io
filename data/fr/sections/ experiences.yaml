    responsibilities:
      - Introduction aux fondamentaux de la programmation Python
      - Enseignement de l'analyse et de la visualisation de données
      - Encadrement des travaux pratiques et évaluation des examens
  
  - designation: Stagiaire
    start: Fév 2025
    end: Juil 2025
    responsibilitiesTitle: Recalage surfacique pour l'analyse du développement cérébral
    responsibilities:
      - Exploration de la méthode [MSM](https://fsl.fmrib.ox.ac.uk/fsl/docs/registration/msm.html) pour le recalage de surfaces corticales
      - Optimisation des paramètres de recalage dans un contexte néonatal
      - Visualisation et analyse statistique des résultats pour valider la méthode

