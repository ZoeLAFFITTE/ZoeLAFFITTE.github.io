summary: |
  Je suis doctorante à l’Institut de Neurosciences de la Timone (INT) à Marseille, France.
  Mes recherches portent sur l’organisation spatiale et la co-variation des plis corticaux au cours du développement cérébral néonatal humain. Plus précisément, je cherche à identifier des motifs du plissement cortical conservés et reproductibles, ainsi qu’à modéliser leurs trajectoires développementales. Ces repères anatomiques fournissent des références robustes pour l’étude de la maturation corticale dans des contextes sains et pathologiques et contribuent à définir des marqueurs quantitatifs du développement cérébral. J’utilise des approches géométriques et topologiques appliquées à des surfaces corticales 3D reconstruites à partir de données IRM.

